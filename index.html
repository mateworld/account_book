<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오픈런 가계부</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f5f6f8; font-family: 'Pretendard', sans-serif; letter-spacing: -0.5px; }
        .stat-card { border: none; border-radius: 1rem; }
        .amount-income { color: #0d6efd; }
        .amount-expense { color: #dc3545; }
        .badge-income { background-color: rgba(13, 110, 253, 0.1); color: #0d6efd; }
        .badge-expense { background-color: rgba(220, 53, 69, 0.1); color: #dc3545; }
    </style>
</head>
<body>

<div class="container py-5">
    <!-- 상단 헤더 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold m-0"><i class="bi bi-wallet2 text-primary me-2"></i>오픈런 가계부</h3>
        <input type="month" id="monthFilter" class="form-control w-auto border-0 shadow-sm">
    </div>

    <!-- 통계 카드 -->
    <div class="row g-3 mb-4 text-center">
        <div class="col-md-4"><div class="card stat-card shadow-sm p-3"><div class="small text-muted mb-1">수입</div><h4 id="totalIncome" class="fw-bold amount-income m-0">0원</h4></div></div>
        <div class="col-md-4"><div class="card stat-card shadow-sm p-3"><div class="small text-muted mb-1">지출</div><h4 id="totalExpense" class="fw-bold amount-expense m-0">0원</h4></div></div>
        <div class="col-md-4"><div class="card stat-card shadow-sm p-3 bg-primary text-white"><div class="small text-white-50 mb-1">잔액</div><h4 id="netBalance" class="fw-bold m-0">0원</h4></div></div>
    </div>

    <!-- 입력 폼 -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-4">
            <form id="ledgerForm" class="row g-2">
                <div class="col-md-1"><select name="type" class="form-select fw-bold"><option value="지출">지출</option><option value="수입">수입</option></select></div>
                <div class="col-md-2"><input type="date" name="date" class="form-control" id="todayDate" required></div>
                <div class="col-md-2"><input type="text" name="vendor" class="form-control" placeholder="거래처" required></div>
                <div class="col-md-2"><input type="text" name="content" class="form-control" placeholder="거래내용"></div>
                <div class="col-md-2"><input type="number" name="amount" class="form-control" placeholder="금액" required></div>
                <div class="col-md-2">
                    <select name="account" class="form-select">
                        <option value="카드">카드</option><option value="현금">현금</option><option value="이체">이체</option><option value="기타">기타</option>
                    </select>
                </div>
                <div class="col-md-1"><button type="submit" class="btn btn-primary w-100">저장</button></div>
            </form>
        </div>
    </div>

    <!-- 리스트 테이블 -->
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-center">
                <thead class="table-light"><tr><th>날짜</th><th>거래처/내용</th><th class="text-end">금액</th><th>삭제</th></tr></thead>
                <tbody id="listArea"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxl9BFn3ai7LIwj0ItAiskoZGoJ7MMkMmWQ-IvSzGsxEgAcGh3BaSNGXjg7tFv6uc4/exec';

    document.getElementById('todayDate').value = new Date().toISOString().substring(0, 10);
    document.getElementById('monthFilter').value = new Date().toISOString().substring(0, 7);

    document.getElementById('ledgerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        try {
            await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
            e.target.reset();
            document.getElementById('todayDate').value = new Date().toISOString().substring(0, 10);
            loadData();
        } catch(e) { alert('등록 오류'); }
    });

    async function loadData() {
        const listArea = document.getElementById('listArea');
        const filterMonth = document.getElementById('monthFilter').value;
        listArea.innerHTML = '<tr><td colspan="7" class="py-4 text-muted small">데이터 동기화 중...</td></tr>';

        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            let html = '', incTotal = 0, expTotal = 0;

            const filtered = data
                .filter(item => item.날짜.startsWith(filterMonth))
                .sort((a, b) => new Date(b.날짜) - new Date(a.날짜));

            filtered.forEach(item => {
                // 수입 여부 판단
                const isInc = item.구분 === '수입';
                if(isInc) incTotal += Number(item.금액); else expTotal += Number(item.금액);

                // 부호 및 글꼴색 클래스 설정
                const sign = isInc ? '+' : '-';
                const colorClass = isInc ? 'text-primary' : 'text-danger'; // 부트스트랩 5 클래스 활용


                html += `
                    <tr>
                        <td class="text-center small text-muted p-1" style="font-size: 0.75rem;">
                            ${item.날짜.substring(5, 10)}
                        </td>
                        <td class="p-1">
                            <div class="fw-bold text-truncate" style="font-size: 0.65rem;">${item.거래처} | ${item.거래내용 || ''}</div>
                            <div class="text-muted" style="font-size: 0.65rem;"><span class="badge ${isInc ? 'bg-primary-subtle text-primary' : 'bg-danger-subtle text-danger'}">${item.구분 || '지출'}</span> ${item.계정}</div>
                        </td>
                        <td class="text-end fw-bold ${colorClass}">${sign}${Number(item.금액).toLocaleString()}원</td>
                        <td class="text-center p-1">
                            <i class="bi bi-trash text-muted" style="cursor:pointer" onclick="deleteData('${item.날짜}','${item.거래처}',${item.금액})"></i>
                        </td>
                    </tr>`;
                /*    
                html += `<tr>
                    <td class="small text-muted">${item.날짜.substring(5, 10)}</td>
                    <td><span class="badge ${isInc ? 'bg-primary-subtle text-primary' : 'bg-danger-subtle text-danger'}">${item.구분 || '지출'}</span></td>
                    <td><small class="text-muted">${item.계정 || '-'}</small></td>
                    <td class="fw-bold">${item.거래처}</td>
                    <td class="text-start small text-truncate" style="max-width:150px;">${item.거래내용 || ''}</td>
                    <!-- 금액 부분: 색상 클래스와 부호 적용 -->
                    <td class="text-end fw-bold ${colorClass}">${sign}${Number(item.금액).toLocaleString()}원</td>
                    <td><i class="bi bi-trash3 text-muted px-2" style="cursor:pointer" onclick="deleteData('${item.날짜}','${item.거래처}',${item.금액})"></i></td>
                </tr>`;
                */
            });

            listArea.innerHTML = html || '<tr><td colspan="7" class="py-5">내역이 없습니다.</td></tr>';
            document.getElementById('totalIncome').innerText = incTotal.toLocaleString() + '원';
            document.getElementById('totalExpense').innerText = expTotal.toLocaleString() + '원';
            document.getElementById('netBalance').innerText = (incTotal - expTotal).toLocaleString() + '원';
        } catch (e) { 
            listArea.innerHTML = '<tr><td colspan="7" class="py-5 text-danger">데이터 로드 실패</td></tr>'; 
        }
    }

    async function deleteData(date, vendor, amount) {
        if(!confirm('삭제하시겠습니까?')) return;
        const cleanDate = date.split('T')[0];
        try {
            const res = await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'delete', date: cleanDate, vendor, amount })
            });
            const result = await res.json();
            if(result.status === 'success') loadData();
            else alert('삭제 실패: ' + result.message);
        } catch (e) { alert('네트워크 오류'); }
    }

    document.getElementById('monthFilter').addEventListener('change', loadData);
    loadData();
</script>
</body>
</html>
